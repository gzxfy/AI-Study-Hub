{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul class="flashes">
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<h1>Study Mode</h1>
<p>Welcome to Study Mode! Here you can review your flashcards and track your progress.</p>
