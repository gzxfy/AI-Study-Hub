{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <ul class="flashes">
      {% for category, message in messages %}
        <li class="{{ category }}">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('note.create_note') }}" enctype="multipart/form-data">
  <label for="title">Title:</label>
  <input type="text" id="title" name="title" value="{{ title }}" required>
  <label for="content">Content:</label>
  <textarea id="content" name="content" required>{{ content }}</textarea>
  <label for="topic_id">Topic:</label>
  <select id="topic_id" name="topic_id">
    <option value="">None</option>
    {% if topics %}
      {% for topic in topics %}
        <option value="{{ topic.id }}" {% if topic.id and topic.id == topic_id|int %}selected{% endif %}>{{ topic.title }}</option>
      {% endfor %}
    {% endif %}
  </select>
  <label for="Note PDF">Note PDF:</label>
  <input type="file" id="note_pdf" name="note_pdf" accept=".pdf">
  <p>Must be a PDF file.</p>
  <button type="submit">Create Note</button>
</form>
